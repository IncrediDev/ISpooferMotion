name: Build Windows App EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows-app-exe:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild

      - name: Build Windows app EXE
        run: npm run build -- --win portable --publish never

      - name: Upload launcher-managed app EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-app-exe
          path: dist/*App*.exe
