name: Build Launcher Setup

on:
  workflow_dispatch:
  push:
    paths:
      - 'launcher/**'
      - 'assets/app_icon.ico'
      - '.github/workflows/build-launcher.yml'

jobs:
  build-launcher-setup:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install launcher dependencies
        working-directory: launcher
        run: npm install

      - name: Build one-file launcher setup
        working-directory: launcher
        run: npm run build:win

      - name: Upload launcher setup artifact
        uses: actions/upload-artifact@v4
        with:
          name: ISpooferMotion-Setup
          path: launcher/dist/ISpooferMotion-Setup.exe
