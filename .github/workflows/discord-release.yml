name: Post Release To Discord

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to post"
        required: true
        default: "v1.2.16"

jobs:
  discord-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tagged release
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Post tagged changelog to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          import sys
          import urllib.request

          webhook_url = os.environ.get("DISCORD_WEBHOOK_URL", "").strip()
          release_tag = os.environ["RELEASE_TAG"].strip()
          release_name = os.environ.get("RELEASE_NAME", "").strip() or release_tag
          release_url = os.environ["RELEASE_URL"].strip()
          prerelease = os.environ.get("RELEASE_PRERELEASE") == "true"

          if not webhook_url:
              raise RuntimeError("Missing DISCORD_RELEASE_WEBHOOK secret.")

          changelog_path = "CHANGELOG.md"

          if not os.path.exists(changelog_path):
              raise RuntimeError("CHANGELOG.md was not found in the tagged release.")

          with open(changelog_path, "r", encoding="utf-8") as file:
              changelog = file.read()

          escaped_tag = re.escape(release_tag)

          patterns = [
              rf"^##\s+\[?{escaped_tag}\]?\s*$",
              rf"^##\s+\[?v?{re.escape(release_tag.lstrip('v'))}\]?\s*$",
          ]

          match = None
          for pattern in patterns:
              match = re.search(pattern, changelog, flags=re.MULTILINE)
              if match:
                  break

          if not match:
              raise RuntimeError(f"No changelog section found for {release_tag}.")

          start = match.end()
          next_section = re.search(r"^##\s+", changelog[start:], flags=re.MULTILINE)
          end = start + next_section.start() if next_section else len(changelog)

          version_changelog = changelog[start:end].strip()

          if not version_changelog:
              version_changelog = "No changelog entries were found for this version."

          if len(version_changelog) > 3500:
              version_changelog = version_changelog[:3450].rstrip() + "\n\n...changelog trimmed. View the full release on GitHub."

          title = f"{release_name} Released"
          color = 16753920 if prerelease else 5763719

          payload = {
              "embeds": [
                  {
                      "title": title,
                      "url": release_url,
                      "description": version_changelog,
                      "color": color,
                      "fields": [
                          {
                              "name": "Version",
                              "value": release_tag,
                              "inline": True
                          },
                          {
                              "name": "Release",
                              "value": f"[Open GitHub Release]({release_url})",
                              "inline": True
                          }
                      ],
                      "footer": {
                          "text": "ISpooferMotion release update"
                      }
                  }
              ]
          }

          request = urllib.request.Request(
              webhook_url,
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "GitHub-Actions-Discord-Release-Webhook"
              },
              method="POST"
          )

          with urllib.request.urlopen(request) as response:
              if response.status >= 300:
                  raise RuntimeError(f"Discord webhook failed with status {response.status}")

          print(f"Posted Discord release announcement for {release_tag}.")
          PY
