<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ISpooferMotion Launcher</title>
  <style>
    :root {
      --bg-color: #2C2F33;
      --titlebar-bg: #23272A;
      --input-bg: #3A3E42;
      --text-color: #FFFFFF;
      --label-color: #B0B3B8;
      --green-accent: #4CAF50;
      --red-accent: #F44336;
      --yellow-accent: #FFC107;
      --border-color: #4F545C;
      --font-main: Arial, sans-serif;
      --disabled-input-bg: #303235;
      --disabled-input-text: #888;
    }

    * { box-sizing: border-box; }



    *::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    *::-webkit-scrollbar-track {
      background: var(--titlebar-bg);
      border-radius: 8px;
    }

    *::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border: 2px solid var(--titlebar-bg);
      border-radius: 8px;
    }

    *::-webkit-scrollbar-thumb:hover {
      background: var(--green-accent);
    }

    * {
      scrollbar-width: thin;
      scrollbar-color: var(--border-color) var(--titlebar-bg);
    }
    body {
      margin: 0;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
      font-family: var(--font-main);
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #titlebar {
      -webkit-app-region: drag;
      height: 70px;
      background-color: var(--titlebar-bg);
      color: var(--text-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 15px;
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    #title-left {
      display: flex;
      align-items: center;
      -webkit-app-region: drag;
    }

    #logo {
      height: 40px;
      width: 40px;
      margin-right: 12px;
      border-radius: 6px;
      object-fit: contain;
    }

    #title-text-container {
      display: flex;
      flex-direction: column;
      -webkit-app-region: drag;
    }

    #titlebar h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      line-height: 1.2;
      -webkit-app-region: drag;
    }

    #titlebar .subtitle {
      font-size: 12px;
      color: var(--label-color);
      margin: 0;
      line-height: 1.2;
      -webkit-app-region: drag;
    }

    #title-buttons {
      display: flex;
      align-items: center;
      -webkit-app-region: no-drag;
    }

    #close-btn {
      -webkit-app-region: no-drag;
      background-color: var(--input-bg);
      border: none;
      color: var(--label-color);
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      width: 30px;
      height: 30px;
      line-height: 30px;
      text-align: center;
      border-radius: 4px;
      transition: background-color 0.2s, color 0.2s;
    }

    #close-btn:hover {
      background-color: var(--red-accent);
      color: var(--text-color);
    }

    .main-content {
      padding: 22px;
      overflow-y: auto;
      flex-grow: 1;
      background-color: var(--bg-color);
    }

    .launcher-panel {
      background: linear-gradient(180deg, rgba(58,62,66,0.98), rgba(48,51,55,0.98));
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.18);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      font-weight: bold;
      color: var(--text-color);
    }

    .panel-subtitle {
      color: var(--label-color);
      font-size: 13px;
      margin-top: 4px;
      line-height: 1.35;
      user-select: text;
      -webkit-user-select: text;
    }

    .status-pill {
      flex-shrink: 0;
      border: 1px solid var(--border-color);
      background: var(--bg-color);
      color: var(--label-color);
      border-radius: 4px;
      padding: 5px 8px;
      font-size: 12px;
      white-space: nowrap;
    }

    .status-pill.success { color: var(--green-accent); }
    .status-pill.error { color: var(--red-accent); }
    .status-pill.warn { color: var(--yellow-accent); }

    .progress-track {
      width: 100%;
      height: 8px;
      background: #25282b;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--border-color);
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: var(--green-accent);
      transition: width 0.2s;
    }

    #progress-text {
      min-height: 16px;
      margin-top: 7px;
      color: var(--label-color);
      font-size: 12px;
      user-select: text;
      -webkit-user-select: text;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    button {
      -webkit-app-region: no-drag;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.2s, opacity 0.2s;
      font-family: var(--font-main);
    }

    #launch-btn {
      flex: 1;
      padding: 12px;
      background-color: var(--green-accent);
      color: var(--text-color);
      border: none;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
    }

    #launch-btn:hover { background-color: #388E3C; transform: translateY(-1px); }
    #launch-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .secondary-btn {
      padding: 10px 12px;
      background: var(--bg-color);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      font-size: 13px;
    }

    .secondary-btn:hover { background: #25282b; border-color: var(--green-accent); }

    .danger-btn {
      padding: 10px 12px;
      background: rgba(244, 67, 54, 0.10);
      color: #ff8a80;
      border: 1px solid rgba(244, 67, 54, 0.45);
      font-size: 13px;
    }

    .danger-btn:hover {
      background: rgba(244, 67, 54, 0.18);
      color: #ffcdd2;
    }

    .log-panel {
      background: rgba(58,62,66,0.86);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.14);
    }

    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      color: var(--label-color);
      font-size: 13px;
    }

    #log {
      height: 200px;
      overflow-y: auto;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 10px;
      font-family: Consolas, ui-monospace, monospace;
      font-size: 12px;
      line-height: 1.45;
      user-select: text;
      -webkit-user-select: text;
    }

    .log-line { color: var(--label-color); margin-bottom: 5px; }
    .log-line.success { color: var(--green-accent); }
    .log-line.error { color: var(--red-accent); }
    .log-line.warn { color: var(--yellow-accent); }

    #status-bar {
      background-color: var(--titlebar-bg);
      padding: 6px 15px;
      border-top: 1px solid var(--border-color);
      flex-shrink: 0;
      min-height: 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    #status-text {
      color: var(--green-accent);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      user-select: text;
      -webkit-user-select: text;
    }

    #status-right {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--label-color);
      font-size: 12px;
      flex-shrink: 0;
    }

    .tiny-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      padding: 4px 8px;
      cursor: pointer;
      color: var(--label-color);
      font-size: 12px;
      border-radius: 4px;
    }

    .tiny-btn:hover {
      background: var(--input-bg);
      color: var(--text-color);
    }
  </style>
</head>
<body>
  <div id="titlebar">
    <div id="title-left">
      <img id="logo" src="assets/app_icon.png" alt="Logo">
      <div id="title-text-container">
        <h1>ISpooferMotion</h1>
        <p class="subtitle">Launcher / Auto Updater</p>
      </div>
    </div>
    <div id="title-buttons">
      <button id="close-btn" aria-label="Close">X</button>
    </div>
  </div>

  <div class="main-content">
    <section class="launcher-panel">
      <div class="panel-header">
        <div>
          <p id="status-title" class="panel-title">Ready to launch</p>
          <div id="status-detail" class="panel-subtitle">Click Launch / Update to download the official app EXE and install the Roblox Studio plugin.</div>
        </div>
        <div id="status-pill" class="status-pill">Launcher</div>
      </div>

      <div class="progress-track"><div id="progress-bar" class="progress-bar"></div></div>
      <div id="progress-text"></div>

      <div class="actions">
        <button id="launch-btn">Launch / Update</button>
        <button id="open-folder-btn" class="secondary-btn">Data Folder</button>
        <button id="uninstall-btn" class="danger-btn">Uninstall</button>
      </div>
    </section>

    <section class="log-panel">
      <div class="log-header">
        <span>Launcher Log</span>
        <button id="open-log-btn" class="tiny-btn">📁 Open Log</button>
      </div>
      <div id="log" aria-live="polite"></div>
    </section>
  </div>

  <div id="status-bar">
    <span id="status-text">Ready</span>
    <span id="status-right">
      <span id="installed-version"></span>
    </span>
  </div>

  <script>
    const statusTitle = document.getElementById('status-title');
    const statusDetail = document.getElementById('status-detail');
    const statusText = document.getElementById('status-text');
    const statusPill = document.getElementById('status-pill');
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');
    const log = document.getElementById('log');
    const launchBtn = document.getElementById('launch-btn');
    const installedVersion = document.getElementById('installed-version');

    function formatBytes(bytes) {
      if (!Number.isFinite(bytes) || bytes <= 0) return '0 MB';
      return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
    }

    function addLog(payload) {
      const line = document.createElement('div');
      line.className = `log-line ${payload.level || 'info'}`;
      line.textContent = `[${new Date().toLocaleTimeString()}] ${payload.message || ''}${payload.detail ? ` - ${payload.detail}` : ''}`;
      log.appendChild(line);
      log.scrollTop = log.scrollHeight;
    }

    function setBusy(isBusy) {
      launchBtn.disabled = isBusy;
      launchBtn.textContent = isBusy ? 'Working...' : 'Launch / Update';
    }

    function setLevel(level) {
      statusPill.className = `status-pill ${level || ''}`;
      if (level === 'success') statusPill.textContent = 'Ready';
      else if (level === 'error') statusPill.textContent = 'Error';
      else if (level === 'warn') statusPill.textContent = 'Notice';
      else statusPill.textContent = 'Working';
    }

    function handleStatus(payload) {
      const message = payload.message || 'Working...';
      statusTitle.textContent = message;
      statusDetail.textContent = payload.detail || '';
      statusText.textContent = message;
      setLevel(payload.level || 'info');

      if (payload.progress) {
        const { downloaded, total } = payload.progress;
        const pct = total ? Math.max(0, Math.min(100, Math.round((downloaded / total) * 100))) : 0;
        progressBar.style.width = `${pct}%`;
        progressText.textContent = total ? `${pct}% — ${formatBytes(downloaded)} / ${formatBytes(total)}` : `${formatBytes(downloaded)} downloaded`;
      } else if (payload.level === 'success') {
        progressBar.style.width = '100%';
        progressText.textContent = '';
      } else if (payload.level === 'error' || payload.level === 'warn') {
        progressText.textContent = '';
      }

      if (payload.log !== false) addLog(payload);
    }

    window.launcherAPI.onStatus(handleStatus);

    launchBtn.addEventListener('click', async () => {
      setBusy(true);
      progressBar.style.width = '0%';
      progressText.textContent = '';
      try {
        await window.launcherAPI.start();
      } catch (err) {
        handleStatus({ level: 'error', message: err && err.message ? err.message : String(err) });
      } finally {
        setBusy(false);
      }
    });

    document.getElementById('open-log-btn').addEventListener('click', () => window.launcherAPI.openLog());
    document.getElementById('open-folder-btn').addEventListener('click', () => window.launcherAPI.openDataFolder());
    document.getElementById('close-btn').addEventListener('click', () => window.launcherAPI.quit());
    document.getElementById('uninstall-btn').addEventListener('click', async () => {
      const ok = confirm('This removes ISpooferMotion managed app files, launcher data, and installed Roblox Studio plugin files. Continue?');
      if (!ok) return;
      setBusy(true);
      try {
        await window.launcherAPI.uninstallAll();
        handleStatus({ level: 'success', message: 'Uninstall complete.', detail: 'Cleanup finished.' });
        setBusy(false);
      } catch (err) {
        handleStatus({ level: 'error', message: err && err.message ? err.message : String(err) });
        setBusy(false);
      }
    });

    window.launcherAPI.getState().then(info => {
      if (info && info.state && info.state.tag) {
        installedVersion.textContent = info.state.tag;
        statusTitle.textContent = `Installed: ${info.state.tag}`;
        statusDetail.textContent = 'Click Launch / Update to check for a newer app EXE and Roblox Studio plugin.';
        statusText.textContent = 'Ready';
        setLevel('success');
      } else {
        installedVersion.textContent = '';
        setLevel('success');
      }
    }).catch(() => {});
  </script>
</body>
</html>
